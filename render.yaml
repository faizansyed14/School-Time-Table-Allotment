# Render Blueprint — two services (API + static frontend)
# Dashboard: New > Blueprint > connect repo, or add services manually using DEPLOY.md

services:
  - type: web
    name: school-erp-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: school-erp-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # SPA routing: use frontend/public/_redirects (must not rewrite /assets/*)
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_ALLOTMENT_TIME_SEC
        value: "120"
